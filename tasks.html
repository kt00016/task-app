  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    :root {
      --font: 'Hiragino Maru Gothic Pro', 'M PLUS Rounded 1c', sans-serif;
      --bg:       #FFF5F7;
      --surface:  #FFFFFF;
      --border:   #E8C4CC;
      --shadow:   #EBBCC6;
      --text:     #5C4A52;
      --subtext:  #B09AA2;
      --pink:     #F9C8D4;
      --peach:    #FDDBB4;
      --mint:     #C8EDD9;
      --sky:      #C8DEF5;
      --lavender: #DDD0F5;
      --yellow:   #FAF0B4;
      --red:      #F5A0AA;
      --orange:   #F9CCA4;
      --green:    #A8DBBE;
    }

    body {
      font-family: var(--font);
      background: var(--bg);
      background-image:
        radial-gradient(circle, #F9C8D422 1.5px, transparent 1.5px),
        radial-gradient(circle, #C8DEF522 1.5px, transparent 1.5px);
      background-size: 30px 30px, 60px 60px;
      background-position: 0 0, 15px 15px;
      min-height: 100vh;
      padding: 20px 14px 80px;
      color: var(--text);
    }

    h1 { font-family: 'Fredoka One', cursive; font-size: 30px; letter-spacing: 2px; color: var(--text); }

    /* HEADER */
    .header { text-align: center; margin-bottom: 24px; }
    .header-badge {
      display: inline-flex; align-items: center; gap: 10px;
      background: var(--pink); border: 2.5px solid var(--border);
      border-radius: 24px; padding: 10px 24px;
      box-shadow: 4px 4px 0 var(--shadow); margin-bottom: 12px;
    }
    .shiba-icon { width: 44px; height: 44px; border-radius: 50%; border: 2px solid var(--border); background: #FADADD; }
    .chips { display: flex; justify-content: center; gap: 8px; flex-wrap: wrap; }
    .chip {
      font-size: 12px; font-weight: 700; border-radius: 20px;
      padding: 4px 12px; border: 1.5px solid; box-shadow: 2px 2px 0;
    }

    /* PANEL */
    .panel {
      background: var(--surface); border: 2.5px solid var(--border);
      border-radius: 20px; padding: 18px;
      box-shadow: 5px 5px 0 var(--shadow); margin-bottom: 16px;
    }
    .panel-title { font-weight: 900; font-size: 13px; margin-bottom: 12px; color: var(--subtext); letter-spacing: 1px; }

    .add-row { display: flex; gap: 8px; margin-bottom: 12px; }
    .main-input {
      flex: 1; border: 2px solid var(--border); border-radius: 14px;
      padding: 10px 14px; font-size: 15px; font-family: var(--font);
      background: var(--bg); color: var(--text);
    }
    .main-input:focus { outline: none; border-color: #F9A8B8; box-shadow: 0 0 0 3px #F9C8D440; }
    .add-btn {
      background: var(--pink); color: var(--text); border: 2px solid var(--border);
      border-radius: 14px; padding: 0 18px; font-size: 22px; font-weight: 900;
      cursor: pointer; box-shadow: 3px 3px 0 var(--shadow);
    }
    .add-btn:active { transform: translate(2px,2px); box-shadow: none; }

    .label { font-size: 11px; font-weight: 900; margin-bottom: 5px; color: var(--subtext); letter-spacing: 0.5px; }
    .btn-group { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 12px; }
    .sel-btn {
      padding: 5px 13px; border-radius: 20px; border: 2px solid var(--border);
      font-weight: 700; font-size: 12px; cursor: pointer; font-family: var(--font);
      transition: all 0.1s; color: var(--text);
    }
    .sel-btn:active { transform: translate(1px,1px); }

    .meta-row { display: flex; gap: 10px; flex-wrap: wrap; align-items: flex-start; }
    .date-input {
      border: 2px solid var(--border); border-radius: 12px;
      padding: 6px 10px; font-size: 13px; font-family: var(--font);
      background: var(--bg); color: var(--text);
    }
    .date-input:focus { outline: none; border-color: #F9A8B8; }

    .tag-box {
      flex: 1; min-width: 150px; display: flex; flex-wrap: wrap; gap: 4px; align-items: center;
      border: 2px solid var(--border); border-radius: 12px;
      padding: 4px 8px; background: var(--bg); min-height: 36px;
    }
    .tag-pill {
      background: var(--yellow); border: 1.5px solid var(--border); border-radius: 12px;
      padding: 2px 8px; font-size: 12px; font-weight: 700; color: var(--text);
      display: flex; align-items: center; gap: 4px;
    }
    .tag-remove { cursor: pointer; color: var(--subtext); }
    .tag-input { border: none; background: transparent; font-size: 13px; outline: none; min-width: 60px; font-family: var(--font); color: var(--text); }

    /* SORT BAR */
    .sort-bar {
      display: flex; align-items: center; gap: 6px; flex-wrap: wrap;
      background: var(--surface); border: 2px solid var(--border);
      border-radius: 16px; padding: 8px 14px;
      box-shadow: 3px 3px 0 var(--shadow); margin-bottom: 12px;
    }
    .sort-label { font-size: 11px; font-weight: 900; color: var(--subtext); white-space: nowrap; }
    .sort-btn {
      padding: 4px 12px; border-radius: 20px; border: 2px solid var(--border);
      font-size: 12px; cursor: pointer; font-family: var(--font); font-weight: 700;
      background: var(--bg); color: var(--text);
    }
    .sort-btn.active { background: var(--lavender); border-color: #C4B0E8; box-shadow: 2px 2px 0 #C4B0E8; }
    .sort-btn:active { transform: translate(1px,1px); box-shadow: none !important; }

    /* FILTERS */
    .filters { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 16px; align-items: center; }
    .filter-btn {
      padding: 4px 11px; border-radius: 20px; border: 2px solid var(--border);
      font-size: 12px; cursor: pointer; font-family: var(--font); font-weight: 500;
      background: var(--surface); color: var(--text);
    }
    .filter-btn.active { font-weight: 900; box-shadow: 2px 2px 0; }
    .filter-btn:active { transform: translate(1px,1px); box-shadow: none !important; }
    .toggle-done {
      margin-left: auto; padding: 4px 12px; border-radius: 20px;
      border: 2px solid var(--border); background: var(--sky);
      font-size: 12px; cursor: pointer; font-family: var(--font); font-weight: 700;
      color: var(--text); box-shadow: 2px 2px 0 #A8C4E8;
    }

    /* TASK CARDS */
    .task-list { display: flex; flex-direction: column; gap: 10px; }
    .task-card {
      border: 2.5px solid; border-radius: 18px; padding: 14px 14px;
      display: flex; gap: 10px; align-items: flex-start; transition: transform 0.15s;
    }
    .task-card:active { transform: scale(0.98); }
    .task-card.done { opacity: 0.5; }

    .check-box {
      width: 26px; height: 26px; border-radius: 50%; border: 2px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; flex-shrink: 0; font-size: 14px; font-weight: 900; margin-top: 2px;
    }

    .task-content { flex: 1; min-width: 0; }
    .task-text-display { font-size: 15px; font-weight: 700; word-break: break-word; padding: 2px 0; color: var(--text); }
    .task-text-display.done-text { text-decoration: line-through; color: var(--subtext); }

    .task-meta { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 7px; align-items: center; }
    .meta-tag {
      font-size: 11px; font-weight: 700; border: 1.5px solid var(--border);
      border-radius: 10px; padding: 2px 8px;
    }

    .card-actions { display: flex; flex-direction: column; gap: 6px; flex-shrink: 0; }
    .edit-btn {
      background: var(--yellow); color: var(--text); border: 2px solid var(--border);
      border-radius: 10px; width: 30px; height: 30px; font-size: 14px;
      cursor: pointer; box-shadow: 2px 2px 0 var(--shadow);
      display: flex; align-items: center; justify-content: center;
    }
    .del-btn {
      background: var(--red); color: #fff; border: 2px solid #E89AA4;
      border-radius: 10px; width: 30px; height: 30px; font-size: 16px;
      cursor: pointer; box-shadow: 2px 2px 0 #E89AA4;
      display: flex; align-items: center; justify-content: center; font-weight: 900;
    }
    .edit-btn:active, .del-btn:active { transform: translate(2px,2px); box-shadow: none; }

    /* MODAL */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(180,140,150,0.35);
      display: flex; align-items: center; justify-content: center; z-index: 100; padding: 16px;
      backdrop-filter: blur(4px);
    }
    .modal {
      background: var(--surface); border: 2.5px solid var(--border);
      border-radius: 24px; padding: 22px;
      box-shadow: 8px 8px 0 var(--shadow);
      width: 100%; max-width: 480px; max-height: 90vh; overflow-y: auto;
    }
    .modal-title { font-weight: 900; font-size: 16px; margin-bottom: 16px; color: var(--text); display: flex; align-items: center; gap: 8px; }
    .modal-input {
      width: 100%; border: 2px solid var(--border); border-radius: 14px;
      padding: 10px 14px; font-size: 15px; font-family: var(--font);
      background: var(--bg); margin-bottom: 14px; color: var(--text);
    }
    .modal-input:focus { outline: none; border-color: #F9A8B8; }
    .modal-actions { display: flex; gap: 8px; margin-top: 16px; }
    .save-btn {
      flex: 1; background: var(--mint); color: var(--text); border: 2px solid #A0CCBA;
      border-radius: 14px; padding: 10px; font-size: 15px; font-weight: 900;
      cursor: pointer; box-shadow: 3px 3px 0 #A0CCBA; font-family: var(--font);
    }
    .cancel-btn {
      flex: 1; background: var(--bg); color: var(--subtext); border: 2px solid var(--border);
      border-radius: 14px; padding: 10px; font-size: 15px; font-weight: 700;
      cursor: pointer; box-shadow: 3px 3px 0 var(--shadow); font-family: var(--font);
    }
    .save-btn:active, .cancel-btn:active { transform: translate(2px,2px); box-shadow: none; }

    .empty { text-align: center; padding: 48px 0; font-size: 18px; color: var(--subtext); }
    .footer-hint { text-align: center; margin-top: 24px; color: var(--subtext); font-size: 12px; }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--pink); border-radius: 10px; }
  </style>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap" rel="stylesheet">
  <link rel="manifest" href="manifest.json">
</head>
<body>
<div id="app"></div>
<div id="modal-root"></div>
<script>
// ── Inline Shiba SVG (for the header badge) ──────────────────────────────
const SHIBA_SVG = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="110" fill="#FADADD"/>
  <ellipse cx="256" cy="340" rx="120" ry="100" fill="#E8A87C"/>
  <circle cx="256" cy="210" r="105" fill="#E8A87C"/>
  <ellipse cx="195" cy="235" rx="38" ry="28" fill="#F4C49E"/>
  <ellipse cx="317" cy="235" rx="38" ry="28" fill="#F4C49E"/>
  <ellipse cx="168" cy="130" rx="38" ry="48" fill="#D4845A" transform="rotate(-15 168 130)"/>
  <ellipse cx="344" cy="130" rx="38" ry="48" fill="#D4845A" transform="rotate(15 344 130)"/>
  <ellipse cx="168" cy="132" rx="22" ry="30" fill="#F4A07A" transform="rotate(-15 168 132)"/>
  <ellipse cx="344" cy="132" rx="22" ry="30" fill="#F4A07A" transform="rotate(15 344 132)"/>
  <ellipse cx="256" cy="250" rx="52" ry="38" fill="#F5D5B8"/>
  <ellipse cx="256" cy="232" rx="18" ry="12" fill="#333"/>
  <circle cx="249" cy="234" r="4" fill="#555"/>
  <circle cx="263" cy="234" r="4" fill="#555"/>
  <path d="M242 258 Q256 272 270 258" stroke="#333" stroke-width="4" fill="none" stroke-linecap="round"/>
  <circle cx="210" cy="200" r="18" fill="#fff"/>
  <circle cx="302" cy="200" r="18" fill="#fff"/>
  <circle cx="213" cy="202" r="11" fill="#333"/>
  <circle cx="305" cy="202" r="11" fill="#333"/>
  <circle cx="217" cy="198" r="4" fill="#fff"/>
  <circle cx="309" cy="198" r="4" fill="#fff"/>
  <ellipse cx="185" cy="228" rx="20" ry="12" fill="#F9A8B8" opacity=".5"/>
  <ellipse cx="327" cy="228" rx="20" ry="12" fill="#F9A8B8" opacity=".5"/>
  <path d="M350 360 Q430 300 400 240 Q380 210 360 250 Q390 290 340 380Z" fill="#E8A87C"/>
  <ellipse cx="200" cy="420" rx="38" ry="22" fill="#D4845A"/>
  <ellipse cx="312" cy="420" rx="38" ry="22" fill="#D4845A"/>
  <ellipse cx="200" cy="418" rx="30" ry="16" fill="#E8A87C"/>
  <ellipse cx="312" cy="418" rx="30" ry="16" fill="#E8A87C"/>
</svg>`;

const CATEGORIES = [
  { label:"💼 仕事",   color:"#F5A0AA", border:"#E89AA4", bg:"#FEF0F2" },
  { label:"🏠 個人",   color:"#84CCB0", border:"#7ABBA0", bg:"#EDF9F4" },
  { label:"🛒 買い物", color:"#F9C87A", border:"#E8B870", bg:"#FEF6E8" },
  { label:"⭐ その他", color:"#B8A4E8", border:"#A898D8", bg:"#F4F0FC" },
];
const PRIORITIES = [
  { label:"🔥 高", color:"#F5A0AA", border:"#E89AA4", shadow:"3px 3px 0 #E89AA4", order:0 },
  { label:"⚡ 中", color:"#F9C87A", border:"#E8B870", shadow:"3px 3px 0 #E8B870", order:1 },
  { label:"🌿 低", color:"#84CCB0", border:"#7ABBA0", shadow:"3px 3px 0 #7ABBA0", order:2 },
];
const CARD_PALETTES = [
  { bg:"#FEF0F2", border:"#F5C4C8", shadow:"#EEB8BC" },
  { bg:"#EDF9F4", border:"#B8E4D0", shadow:"#A8D4C0" },
  { bg:"#FEF6E8", border:"#F9DCA8", shadow:"#E8CC98" },
  { bg:"#F4F0FC", border:"#D4C8F0", shadow:"#C4B8E0" },
  { bg:"#EEF5FE", border:"#B8D4F0", shadow:"#A8C4E0" },
  { bg:"#FEF0FA", border:"#F0C0E4", shadow:"#E0B0D4" },
];

let state = {
  tasks: JSON.parse(localStorage.getItem('shiba_tasks') || 'null') || [
    { id:1, text:"プレゼン資料を完成させる", priority:"🔥 高", category:"💼 仕事",   due:"2026-03-20", done:false, tags:["デザイン"] },
    { id:2, text:"週次レポートを提出",       priority:"⚡ 中", category:"💼 仕事",   due:"2026-03-22", done:false, tags:[] },
    { id:3, text:"牛乳・卵・パンを買う",     priority:"🌿 低", category:"🛒 買い物", due:"",           done:true,  tags:["食料品"] },
    { id:4, text:"ジムに行く",               priority:"🌿 低", category:"🏠 個人",   due:"2026-03-19", done:false, tags:["健康"] },
  ],
  nextId:10,
  input:"", priority:"⚡ 中", category:"💼 仕事", due:"", tagInput:"", tags:[],
  filterCat:"すべて", filterPri:"すべて", showDone:true, sortMode:"priority",
  editingId:null, editText:"", editPriority:"", editCategory:"", editDue:"", editTagInput:"", editTags:[],
};

const save       = () => localStorage.setItem('shiba_tasks', JSON.stringify(state.tasks));
const cardPal    = id => CARD_PALETTES[id % CARD_PALETTES.length];
const priOrder   = lbl => { const p=PRIORITIES.find(p=>p.label===lbl); return p?p.order:99; };

function formatDue(d) {
  if (!d) return null;
  const today=new Date(); today.setHours(0,0,0,0);
  const due=new Date(d); due.setHours(0,0,0,0);
  const diff=Math.round((due-today)/86400000);
  if (diff<0)   return { text:`${Math.abs(diff)}日超過`, bg:"#F5A0AA", color:"#fff",  border:"#E89AA4" };
  if (diff===0) return { text:"今日締切！",              bg:"#FAE08A", color:"#7A6000", border:"#E8CC70" };
  if (diff<=3)  return { text:`あと${diff}日`,           bg:"#F9C87A", color:"#7A5000", border:"#E8B870" };
  return { text:`📅 ${due.getMonth()+1}/${due.getDate()}`, bg:"#C8DEF5", color:"#4060A0", border:"#A8C4E0" };
}

function getSorted(arr) {
  const a=[...arr];
  if (state.sortMode==="priority") a.sort((x,y)=>x.done!==y.done?(x.done?1:-1):priOrder(x.priority)-priOrder(y.priority));
  if (state.sortMode==="due")      a.sort((x,y)=>{ if(x.done!==y.done)return x.done?1:-1; if(!x.due&&!y.due)return 0; if(!x.due)return 1; if(!y.due)return -1; return new Date(x.due)-new Date(y.due); });
  return a;
}
function getFiltered() {
  return getSorted(state.tasks.filter(t=>{
    if(!state.showDone&&t.done) return false;
    if(state.filterCat!=="すべて"&&t.category!==state.filterCat) return false;
    if(state.filterPri!=="すべて"&&t.priority!==state.filterPri) return false;
    return true;
  }));
}
function addTag(src) {
  const raw=src==='edit'?state.editTagInput:state.tagInput;
  const t=raw.trim().replace(/,/g,'');
  if(src==='edit'){if(t&&!state.editTags.includes(t))state.editTags.push(t);state.editTagInput="";}
  else            {if(t&&!state.tags.includes(t))    state.tags.push(t);    state.tagInput="";}
  render();
}
function addTask(){
  if(!state.input.trim())return;
  state.tasks.unshift({id:state.nextId++,text:state.input.trim(),priority:state.priority,category:state.category,due:state.due,done:false,tags:[...state.tags]});
  state.input="";state.due="";state.tags=[];
  save();render();
}
function toggleDone(id){const t=state.tasks.find(t=>t.id===id);if(t)t.done=!t.done;save();render();}
function deleteTask(id){state.tasks=state.tasks.filter(t=>t.id!==id);save();render();}
function openEdit(task){
  state.editingId=task.id;state.editText=task.text;state.editPriority=task.priority;
  state.editCategory=task.category;state.editDue=task.due||"";
  state.editTags=[...(task.tags||[])];state.editTagInput="";render();
}
function saveEdit(){
  const t=state.tasks.find(t=>t.id===state.editingId);
  if(t){t.text=state.editText.trim()||t.text;t.priority=state.editPriority;t.category=state.editCategory;t.due=state.editDue;t.tags=[...state.editTags];}
  state.editingId=null;save();render();
}
function closeEdit(){state.editingId=null;render();}

function h(tag,attrs,...children){
  const el=document.createElement(tag);
  for(const[k,v]of Object.entries(attrs||{})){
    if(k==='style'&&typeof v==='object')Object.assign(el.style,v);
    else if(k==='innerHTML')el.innerHTML=v;
    else if(k.startsWith('on'))el.addEventListener(k.slice(2).toLowerCase(),v);
    else el.setAttribute(k,v);
  }
  for(const c of children.flat()){if(c==null)continue;el.appendChild(typeof c==='string'?document.createTextNode(c):c);}
  return el;
}

function mkTagBox(tagsArr,tagInputVal,src){
  const pills=tagsArr.map(t=>h('span',{class:'tag-pill'},t,h('span',{class:'tag-remove',onclick:()=>{if(src==='edit')state.editTags=state.editTags.filter(x=>x!==t);else state.tags=state.tags.filter(x=>x!==t);render();}},' ×')));
  const inp=h('input',{class:'tag-input',placeholder:'タグ名…',value:tagInputVal});
  inp.addEventListener('input',e=>{if(src==='edit')state.editTagInput=e.target.value;else state.tagInput=e.target.value;});
  inp.addEventListener('keydown',e=>{if(e.key==='Enter'||e.key===','){e.preventDefault();addTag(src);}});
  return h('div',{class:'tag-box'},...pills,inp);
}

function mkSelBtns(labels,current,setter,colorFn,borderFn,shadowFn){
  return labels.map(lbl=>{
    const active=current===lbl;
    return h('button',{class:'sel-btn',
      style:{background:active?colorFn(lbl):'var(--bg)',borderColor:active?borderFn(lbl):'var(--border)',
             boxShadow:active?shadowFn(lbl):'none',color:active?'#fff':'var(--text)'},
      onclick:()=>{setter(lbl);render();}},lbl);
  });
}

function renderModal(){
  const root=document.getElementById('modal-root');
  root.innerHTML='';
  if(!state.editingId)return;

  const priColor  = lbl=>{const p=PRIORITIES.find(p=>p.label===lbl);return p?p.color:'var(--bg)';};
  const priBorder = lbl=>{const p=PRIORITIES.find(p=>p.label===lbl);return p?p.border:'var(--border)';};
  const priShadow = lbl=>{const p=PRIORITIES.find(p=>p.label===lbl);return p?p.shadow:'none';};
  const catColor  = lbl=>{const c=CATEGORIES.find(c=>c.label===lbl);return c?c.color:'var(--bg)';};
  const catBorder = lbl=>{const c=CATEGORIES.find(c=>c.label===lbl);return c?c.border:'var(--border)';};
  const catShadow = lbl=>{const c=CATEGORIES.find(c=>c.label===lbl);return c?`3px 3px 0 ${c.border}`:'none';};

  const textInp=h('input',{class:'modal-input',placeholder:'タスク名',value:state.editText});
  textInp.addEventListener('input',e=>{state.editText=e.target.value;});
  const dueInp=h('input',{type:'date',class:'date-input',value:state.editDue,style:{background:state.editDue?'#FEF0F2':'var(--bg)',marginBottom:'12px',display:'block'}});
  dueInp.addEventListener('change',e=>{state.editDue=e.target.value;render();});

  const modal=h('div',{class:'modal'},
    h('div',{class:'modal-title'},h('span',{innerHTML:SHIBA_SVG,style:{width:'28px',height:'28px',display:'inline-flex',flexShrink:'0'}}),'タスクを編集'),
    h('div',{class:'label'},'タスク名'),textInp,
    h('div',{class:'label'},'優先度'),
    h('div',{class:'btn-group'},...mkSelBtns(PRIORITIES.map(p=>p.label),state.editPriority,v=>{state.editPriority=v;},priColor,priBorder,priShadow)),
    h('div',{class:'label'},'カテゴリ'),
    h('div',{class:'btn-group'},...mkSelBtns(CATEGORIES.map(c=>c.label),state.editCategory,v=>{state.editCategory=v;},catColor,catBorder,catShadow)),
    h('div',{class:'label'},'📅 締切日'),dueInp,
    h('div',{class:'label'},'🏷️ タグ（Enterで追加）'),
    mkTagBox(state.editTags,state.editTagInput,'edit'),
    h('div',{class:'modal-actions'},
      h('button',{class:'cancel-btn',onclick:closeEdit},'キャンセル'),
      h('button',{class:'save-btn',onclick:saveEdit},'🐾 保存'),
    )
  );
  const overlay=h('div',{class:'modal-overlay',onclick:e=>{if(e.target===overlay)closeEdit();}},modal);
  root.appendChild(overlay);
}

function render(){
  const app=document.getElementById('app');
  const doneCnt=state.tasks.filter(t=>t.done).length;
  const filtered=getFiltered();

  const priColor  = lbl=>{const p=PRIORITIES.find(p=>p.label===lbl);return p?p.color:'var(--bg)';};
  const priBorder = lbl=>{const p=PRIORITIES.find(p=>p.label===lbl);return p?p.border:'var(--border)';};
  const priShadow = lbl=>{const p=PRIORITIES.find(p=>p.label===lbl);return p?p.shadow:'none';};
  const catColor  = lbl=>{const c=CATEGORIES.find(c=>c.label===lbl);return c?c.color:'var(--bg)';};
  const catBorder = lbl=>{const c=CATEGORIES.find(c=>c.label===lbl);return c?c.border:'var(--border)';};
  const catShadow = lbl=>{const c=CATEGORIES.find(c=>c.label===lbl);return c?`3px 3px 0 ${c.border}`:'none';};

  // Shiba badge icon
  const shibaEl=h('span',{innerHTML:SHIBA_SVG,class:'shiba-icon'});

  const mainInp=h('input',{class:'main-input',placeholder:'タスクを入力してEnterまたは＋',value:state.input});
  mainInp.addEventListener('input',e=>{state.input=e.target.value;});
  mainInp.addEventListener('keydown',e=>{if(e.key==='Enter')addTask();});
  const dueInp=h('input',{type:'date',class:'date-input',value:state.due,style:{background:state.due?'#FEF0F2':'var(--bg)'}});
  dueInp.addEventListener('change',e=>{state.due=e.target.value;render();});

  const panel=h('div',{class:'panel'},
    h('div',{class:'panel-title'},'✦ 新しいタスクを追加'),
    h('div',{class:'add-row'},mainInp,h('button',{class:'add-btn',onclick:addTask},'＋')),
    h('div',{class:'label'},'優先度'),
    h('div',{class:'btn-group'},...mkSelBtns(PRIORITIES.map(p=>p.label),state.priority,v=>{state.priority=v;},priColor,priBorder,priShadow)),
    h('div',{class:'label'},'カテゴリ'),
    h('div',{class:'btn-group'},...mkSelBtns(CATEGORIES.map(c=>c.label),state.category,v=>{state.category=v;},catColor,catBorder,catShadow)),
    h('div',{class:'meta-row'},
      h('div',{},h('div',{class:'label'},'📅 締切日'),dueInp),
      h('div',{style:{flex:'1',minWidth:'150px'}},h('div',{class:'label'},'🏷️ タグ（Enterで追加）'),mkTagBox(state.tags,state.tagInput,'add')),
    )
  );

  const sortBar=h('div',{class:'sort-bar'},
    h('span',{class:'sort-label'},'並び替え：'),
    ...['priority','due','added'].map((m,i)=>{
      return h('button',{class:'sort-btn'+(state.sortMode===m?' active':''),onclick:()=>{state.sortMode=m;render();}},['🔥 優先度順','📅 締切順','🕐 追加順'][i]);
    })
  );

  // Filter buttons with pastel active colors
  const catFilterColors = { 'すべて': {bg:'#F9C8D4',border:'#E8B8C4'}, ...Object.fromEntries(CATEGORIES.map(c=>([c.label,{bg:c.bg,border:c.border}]))) };
  const priFilterColors = { 'すべて': {bg:'#DDD0F5',border:'#C4B0E8'}, ...Object.fromEntries(PRIORITIES.map(p=>([p.label,{bg:p.color+'55',border:p.border}]))) };
  const filterEls=[
    ...['すべて',...CATEGORIES.map(c=>c.label)].map(c=>{
      const active=state.filterCat===c;
      const col=catFilterColors[c]||{bg:'var(--pink)',border:'var(--border)'};
      return h('button',{class:'filter-btn'+(active?' active':''),
        style:active?{background:col.bg,borderColor:col.border,boxShadow:`2px 2px 0 ${col.border}`}:{},
        onclick:()=>{state.filterCat=c;render();}},c==='すべて'?'🌸 すべて':c);
    }),
    ...['すべて',...PRIORITIES.map(p=>p.label)].map(p=>{
      const active=state.filterPri===p;
      const col=priFilterColors[p]||{bg:'var(--lavender)',border:'#C4B0E8'};
      return h('button',{class:'filter-btn'+(active?' active':''),
        style:active?{background:col.bg,borderColor:col.border,boxShadow:`2px 2px 0 ${col.border}`}:{},
        onclick:()=>{state.filterPri=p;render();}},p==='すべて'?'✦ 全優先度':p);
    }),
    h('button',{class:'toggle-done',onclick:()=>{state.showDone=!state.showDone;render();}},state.showDone?'🙈 完了を隠す':'👀 完了を表示')
  ];

  const cards=filtered.length===0
    ?[h('div',{class:'empty'},'🐕 タスクなし！わんわん')]
    :filtered.map(task=>{
        const pal=cardPal(task.id);
        const dueInfo=formatDue(task.due);
        const pri=PRIORITIES.find(p=>p.label===task.priority);
        const cat=CATEGORIES.find(c=>c.label===task.category);

        const checkBox=h('div',{class:'check-box',
          style:{background:task.done?'#84CCB0':'var(--surface)',borderColor:task.done?'#7ABBA0':'var(--border)'},
          onclick:()=>toggleDone(task.id)},task.done?'✓':'');

        const textEl=h('div',{class:'task-text-display'+(task.done?' done-text':'')},task.text);

        const metaTags=[];
        if(cat)     metaTags.push(h('span',{class:'meta-tag',style:{background:cat.bg,borderColor:cat.border,color:cat.color}},cat.label));
        if(pri)     metaTags.push(h('span',{class:'meta-tag',style:{background:pri.color+'33',borderColor:pri.border,color:pri.color}},pri.label));
        if(dueInfo) metaTags.push(h('span',{class:'meta-tag',style:{background:dueInfo.bg,borderColor:dueInfo.border||'#ccc',color:dueInfo.color}},'📅 '+dueInfo.text));
        (task.tags||[]).forEach(t=>metaTags.push(h('span',{class:'meta-tag',style:{background:'#FAF0B4',borderColor:'#E8DC90',color:'#7A6800'}},'#'+t)));

        const actions=h('div',{class:'card-actions'},
          h('button',{class:'edit-btn',onclick:()=>openEdit(task)},'✏️'),
          h('button',{class:'del-btn', onclick:()=>deleteTask(task.id)},'×'),
        );

        return h('div',{class:'task-card'+(task.done?' done':''),
          style:{background:task.done?'#F8F4F5':pal.bg, borderColor:task.done?'#E8DDE0':pal.border, boxShadow:task.done?`3px 3px 0 #E0D4D8`:`4px 4px 0 ${pal.shadow}`}},
          checkBox,
          h('div',{class:'task-content'},textEl,h('div',{class:'task-meta'},...metaTags)),
          actions);
      });

  const wrapper=h('div',{style:{maxWidth:'680px',margin:'0 auto'}},
    h('div',{class:'header'},
      h('div',{class:'header-badge'},shibaEl,h('h1',{},'タスク帳')),
      h('div',{class:'chips'},
        h('span',{class:'chip',style:{color:'#D07080',borderColor:'#F5A0AA',boxShadow:'2px 2px 0 #F5A0AA',background:'#FEF0F2'}},`📋 全${state.tasks.length}件`),
        h('span',{class:'chip',style:{color:'#508870',borderColor:'#84CCB0',boxShadow:'2px 2px 0 #84CCB0',background:'#EDF9F4'}},`✅ 完了 ${doneCnt}件`),
        h('span',{class:'chip',style:{color:'#8070B8',borderColor:'#B8A4E8',boxShadow:'2px 2px 0 #B8A4E8',background:'#F4F0FC'}},`🐾 残り ${state.tasks.length-doneCnt}件`),
      )
    ),
    panel,sortBar,
    h('div',{class:'filters'},...filterEls),
    h('div',{class:'task-list'},...cards),
    h('div',{class:'footer-hint'},'✏️ ボタンでタスクを編集 · 🐕 ワンワン頑張ろう！')
  );

  app.innerHTML='';
  app.appendChild(wrapper);
  renderModal();
}

render();
</script>

<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js');
  });
}
</script>

</body>
